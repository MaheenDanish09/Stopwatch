<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>

    <!-- BOOSTRAP CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- CUSTOM CSS -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="main-container container-fluid d-flex justify-content-center align-items-center vh-100">
        <div class="card d-flex justify-content-center align-items-center text-center h-50 rounded-5 shadow-lg"
            style="min-width: 600px;">
            <h1 class="pb-3">Stopwatch</h1>
            <div id="display" class="p-3" style="min-width: 200px;">
                00:00:00
            </div>
            <div class="buttons">
                <button id="startBtn" class="me-4 p-2 bg-success-subtle">Start</button>
                <button id="pauseBtn" class="me-4 p-2 bg-warning-subtle">Pause</button>
                <button id="resetBtn" class="me-4 p-2 bg-danger-subtle">Reset</button>
            </div>
        </div>
    </div>
    
    <!-- BOOTSTRAP JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- CUSTOM JS -->
    <script src="./index.js"></script>
</body>

</html>
